# 人力资源数据中心系统 - 核心配置
# 依据：开题报告 4.3 节、后端开发设计文档

server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hr_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # Hive 配置（用于分析数据）
  hive:
    jdbc-url: jdbc:hive2://localhost:10000/default
    username: root
    password: "123456"

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

# 日志
logging:
  level:
    com.hr: INFO
    org.apache.hadoop: WARN
